# ============================================================
# 주식 모니터링/트레이딩 시스템 설정 파일
# ============================================================

# 주식 설정
stocks:
  # 항상 모니터링할 고정 종목 목록
  watchlist: [AAPL, MSFT, GOOGL, AMZN, TSLA]

  # 자동 종목 발굴 설정 (S&P500 유니버스에서 조건에 맞는 종목 탐색)
  discovery:
    enabled: true
    universes: [sp500]      # 탐색 대상 유니버스
    max_candidates: 20      # 최대 후보 종목 수
    filters:
      min_market_cap: 1_000_000_000  # 시가총액 최소 10억 달러
      min_avg_volume: 500_000        # 일평균 거래량 최소 50만 주
      max_per: 25                    # PER 최대 25배
      min_rsi: null                  # RSI 하한 없음
      max_rsi: 40                    # RSI 최대 40 (과매도 종목 탐색)

# 데이터 소스 설정
providers:
  price: yfinance           # 주가 데이터 수집 라이브러리
  fundamental: yfinance     # 기본 재무 데이터 수집 라이브러리
  news:
    - source: financialjuice
      url: "https://www.financialjuice.com/feed.ashx?xy=rss"
    - source: forexlive
      url: "https://www.forexlive.com/feed/"
    - source: investing_com
      url: "https://www.investing.com/rss/news.rss"
    - source: federal_reserve
      url: "https://www.federalreserve.gov/feeds/press_all.xml"

# 매매 규칙
rules:
  # 매수 조건 (모든 조건 충족 시 매수 시그널)
  buy_conditions:
    - { indicator: per, operator: "<", value: 15 }      # PER < 15 (저평가)
    - { indicator: rsi_14, operator: "<", value: 30 }   # RSI(14) < 30 (과매도)
  # 매도 조건 (하나라도 충족 시 매도 시그널)
  sell_conditions:
    - { indicator: rsi_14, operator: ">", value: 70 }   # RSI(14) > 70 (과매수)
    - { indicator: per, operator: ">", value: 40 }      # PER > 40 (고평가)

# 기술 지표 파라미터
indicators:
  rsi_period: 14                # RSI 계산 기간
  macd_fast: 12                 # MACD 단기 EMA
  macd_slow: 26                 # MACD 장기 EMA
  macd_signal: 9                # MACD 시그널 라인
  sma_periods: [20, 50, 200]    # 단순 이동평균 기간 (단기/중기/장기)
  bollinger_period: 20          # 볼린저 밴드 기간
  bollinger_std: 2              # 볼린저 밴드 표준편차 배수

# 뉴스 감성 분석 설정
sentiment:
  enabled: true
  model: gpt-4o-mini  # 감성 분석에 사용할 LLM 모델
  weight: 0.3         # 매매 시그널 산출 시 감성 점수 가중치 (30%)

# 모의 투자(페이퍼 트레이딩) 설정
paper_trading:
  enabled: true
  initial_capital: 100000   # 초기 모의 자본금 ($100,000)
  max_position_pct: 0.1     # 종목당 최대 비중 (10%)
  db_path: ./data/portfolio.json  # 포트폴리오 저장 경로

# 데이터베이스 설정 (뉴스 데이터 저장)
database:
  enabled: true
  path: "./data/news.duckdb"  # DuckDB 파일 경로

# 뉴스 기반 평가 설정
news_evaluation:
  enabled: true
  # 각 지표별 저평가/고평가 기준
  thresholds:
    rsi:
      undervalued: 35      # RSI < 35 → 저평가
      overvalued: 65       # RSI > 65 → 고평가
    per:
      undervalued: 15      # PER < 15 → 저평가
      overvalued: 35       # PER > 35 → 고평가
    pbr:
      undervalued: 1.0     # PBR < 1.0 → 저평가
      overvalued: 5.0      # PBR > 5.0 → 고평가
    bollinger:
      enabled: true        # 볼린저 밴드 이탈 여부 사용
  # 종합 점수 가중치 (합계 = 1.0)
  weights:
    rsi: 0.25
    per: 0.30
    pbr: 0.20
    bollinger: 0.25
  # 알림 발송 기준 (composite_score 절대값)
  alert_threshold: 0.4

# 유사 뉴스 중복 제거 설정
news_dedup:
  similarity_threshold: 0.85  # 코사인 유사도 임계값 (0.0~1.0, 높을수록 엄격 / embedding 기준)

# 전체 시스템 폴링 주기 (300초 = 5분)
poll_interval_seconds: 300
